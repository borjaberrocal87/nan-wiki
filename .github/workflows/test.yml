name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wiki_nan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: packages/bot
        run: npx prisma generate

      - name: Run shared tests
        working-directory: packages/shared
        run: pnpm test -- --run

      - name: Run bot tests
        working-directory: packages/bot
        run: pnpm test -- --run

      - name: Run web tests
        working-directory: packages/web
        run: pnpm test -- --run

      - name: Run API tests
        working-directory: packages/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wiki_nan_test
          JWT_SECRET: test-secret-for-ci
          DISCORD_TOKEN: test-token
          LLM_BASE_URL: http://localhost:11434
          LLM_MODEL: llama3.1
          EMBEDDING_MODEL: nomic-embed-text
          LLM_API_KEY: test-key
        run: bash run_tests.sh

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web
        working-directory: packages/web
        run: pnpm lint

      - name: Lint bot
        working-directory: packages/bot
        run: pnpm lint

      - name: Lint API
        working-directory: packages/api
        run: pnpm run lint
